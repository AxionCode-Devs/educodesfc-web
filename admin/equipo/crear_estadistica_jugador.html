<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Añadir Estadísticas - Club Deportivo</title>

    <!-- Scripts de Mocking y Layout -->
    <script src="../../js/mock-db.js"></script>
    <script src="../../js/layout.js" defer></script>
    <script>
        window.pageTitle = "Añadir Estadísticas del Jugador";
        window.activePage = "equipo";
    </script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar inyectado dinámicamente -->
        <div id="layout-sidebar"></div>

        <main class="main-content">
            <!-- Header inyectado dinámicamente -->
            <div id="layout-top-header"></div>

            <section class="dashboard-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-plus-circle me-2"></i>Añadir Estadísticas para: <span id="player-name">Jugador</span></h2>
                    <a id="btn-back" href="#" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-left-circle me-2"></i>Volver a Estadísticas
                    </a>
                </div>

                <!-- Alertas de errores -->
                <div id="validation-errors" class="alert alert-danger mb-4" role="alert" style="display: none;">
                    <h5 class="alert-heading">Errores de Validación:</h5>
                    <ul id="errors-list" class="mb-0"></ul>
                </div>

                <div id="player-not-found" class="alert alert-danger" style="display: none;">
                    Jugador no encontrado o no es un miembro activo.
                </div>

                <div class="card shadow-sm" id="form-card" style="display: none;">
                    <div class="card-body">
                        <form id="stats-create-form" novalidate>
                            <input type="hidden" id="miembro_id" name="miembro_id">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="temporada" class="form-label">Temporada <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="temporada" name="temporada" placeholder="Ej: 2025/2026" required>
                                    <div class="form-text">Formato recomendado: AAAA/AAAA (ej: 2025/2026)</div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="partidos_jugados" class="form-label">Partidos Jugados <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="partidos_jugados" name="partidos_jugados" value="0" min="0" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="minutos_jugados" class="form-label">Minutos Jugados</label>
                                    <input type="number" class="form-control" id="minutos_jugados" name="minutos_jugados" value="0" min="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="goles_anotados" class="form-label">Goles Anotados</label>
                                    <input type="number" class="form-control" id="goles_anotados" name="goles_anotados" value="0" min="0">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="asistencias" class="form-label">Asistencias</label>
                                    <input type="number" class="form-control" id="asistencias" name="asistencias" value="0" min="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="pases_intentados" class="form-label">Pases Intentados</label>
                                    <input type="number" class="form-control" id="pases_intentados" name="pases_intentados" value="0" min="0">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="pases_completados" class="form-label">Pases Completados</label>
                                    <input type="number" class="form-control" id="pases_completados" name="pases_completados" value="0" min="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="recuperaciones" class="form-label">Recuperaciones</label>
                                    <input type="number" class="form-control" id="recuperaciones" name="recuperaciones" value="0" min="0">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="tarjetas_amarillas" class="form-label">Tarjetas Amarillas</label>
                                    <input type="number" class="form-control" id="tarjetas_amarillas" name="tarjetas_amarillas" value="0" min="0">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="tarjetas_rojas" class="form-label">Tarjetas Rojas</label>
                                    <input type="number" class="form-control" id="tarjetas_rojas" name="tarjetas_rojas" value="0" min="0">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="lesiones_sufridas" class="form-label">Lesiones Sufridas</label>
                                    <input type="number" class="form-control" id="lesiones_sufridas" name="lesiones_sufridas" value="0" min="0">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="notas_rendimiento" class="form-label">Notas de Rendimiento</label>
                                <textarea class="form-control" id="notas_rendimiento" name="notas_rendimiento" rows="4" placeholder="Ej: Gran desempeño táctico, excelente visión de juego..."></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <button type="submit" class="btn btn-success"><i class="bi bi-save me-2"></i>Guardar Estadísticas</button>
                                <a id="btn-cancel" href="#" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Script de inicialización y envío -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!window.MockDB) return;

            // 1. Obtener ID del jugador
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has("id")) {
                window.location.href = "index.html?status=error&message=" + encodeURIComponent("ID de jugador no proporcionado.");
                return;
            }

            const mId = parseInt(urlParams.get("id"));
            const jugador = window.MockDB.getMember(mId);

            if (!jugador || jugador.tipo_miembro !== "Jugador") {
                document.getElementById("player-not-found").style.display = "block";
                return;
            }

            // Configurar botones de volver/cancelar
            document.getElementById("btn-back").href = `ver_estadisticas_jugador.html?id=${jugador.id}`;
            document.getElementById("btn-cancel").href = `ver_estadisticas_jugador.html?id=${jugador.id}`;

            // Rellenar cabecera
            document.getElementById("player-name").textContent = jugador.nombre_completo;
            document.getElementById("miembro_id").value = jugador.id;
            
            // Sugerir temporada actual
            const ahora = new Date();
            const añoAct = ahora.getFullYear();
            document.getElementById("temporada").value = `${añoAct}/${añoAct + 1}`;

            document.getElementById("form-card").style.display = "block";

            // 2. Procesar el formulario
            document.getElementById("stats-create-form").addEventListener("submit", function(event) {
                event.preventDefault();

                const errorsList = document.getElementById("errors-list");
                const errorsAlert = document.getElementById("validation-errors");
                errorsList.innerHTML = "";
                errorsAlert.style.display = "none";

                // Valores
                const temporada = document.getElementById("temporada").value.trim();
                const partidos = parseInt(document.getElementById("partidos_jugados").value) || 0;
                const minutos = parseInt(document.getElementById("minutos_jugados").value) || 0;
                const goles = parseInt(document.getElementById("goles_anotados").value) || 0;
                const asistencias = parseInt(document.getElementById("asistencias").value) || 0;
                const pasesInt = parseInt(document.getElementById("pases_intentados").value) || 0;
                const pasesComp = parseInt(document.getElementById("pases_completados").value) || 0;
                const recuperaciones = parseInt(document.getElementById("recuperaciones").value) || 0;
                const amarillas = parseInt(document.getElementById("tarjetas_amarillas").value) || 0;
                const rojas = parseInt(document.getElementById("tarjetas_rojas").value) || 0;
                const lesiones = parseInt(document.getElementById("lesiones_sufridas").value) || 0;
                const notas = document.getElementById("notas_rendimiento").value.trim();

                // Validación simple
                const errors = [];
                if (!temporada) errors.push("La temporada es requerida.");
                if (partidos < 0) errors.push("Los partidos jugados no pueden ser negativos.");
                if (minutos < 0) errors.push("Los minutos jugados no pueden ser negativos.");
                if (goles < 0) errors.push("Los goles anotados no pueden ser negativos.");
                if (asistencias < 0) errors.push("Las asistencias no pueden ser negativas.");
                if (pasesInt < 0) errors.push("Los pases intentados no pueden ser negativos.");
                if (pasesComp < 0) errors.push("Los pases completados no pueden ser negativos.");
                if (pasesComp > pasesInt) errors.push("Los pases completados no pueden superar a los pases intentados.");
                if (recuperaciones < 0) errors.push("Las recuperaciones no pueden ser negativas.");
                if (amarillas < 0) errors.push("Las tarjetas amarillas no pueden ser negativas.");
                if (rojas < 0) errors.push("Las tarjetas rojas no pueden ser negativas.");
                if (lesiones < 0) errors.push("Las lesiones no pueden ser negativas.");

                // Comprobar si ya existe esa temporada registrada para este jugador
                const statsExistentes = window.MockDB.getStatsByPlayer(mId);
                const temporadaRepetida = statsExistentes.some(s => s.temporada.toLowerCase() === temporada.toLowerCase());
                if (temporadaRepetida) {
                    errors.push(`Ya existen estadísticas registradas para la temporada ${temporada}.`);
                }

                if (errors.length > 0) {
                    errors.forEach(err => {
                        const li = document.createElement("li");
                        li.textContent = err;
                        errorsList.appendChild(li);
                    });
                    errorsAlert.style.display = "block";
                    window.scrollTo(0, 0);
                    return;
                }

                // Guardar
                const statData = {
                    miembro_id: mId,
                    temporada: temporada,
                    partidos_jugados: partidos,
                    minutos_jugados: minutos,
                    goles_anotados: goles,
                    asistencias: asistencias,
                    pases_intentados: pasesInt,
                    pases_completados: pasesComp,
                    recuperaciones: recuperaciones,
                    tarjetas_amarillas: amarillas,
                    tarjetas_rojas: rojas,
                    lesiones_sufridas: lesiones,
                    notas_rendimiento: notas
                };

                window.MockDB.addStat(statData);

                // Redirigir con éxito
                window.location.href = `ver_estadisticas_jugador.html?id=${mId}&status=success_add`;
            });
        });
    </script>
</body>
</html>
