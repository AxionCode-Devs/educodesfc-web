<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Equipo - Club Deportivo</title>

    <!-- Scripts de Mocking y Layout -->
    <script src="../../js/mock-db.js"></script>
    <script src="../../js/layout.js" defer></script>
    <script>
        window.pageTitle = "Gestión de Equipo por Categoría";
        window.activePage = "equipo";
    </script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar inyectado dinámicamente -->
        <div id="layout-sidebar"></div>

        <main class="main-content">
            <!-- Header inyectado dinámicamente -->
            <div id="layout-top-header"></div>

            <section class="dashboard-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Gestión de Equipo por Categoría</h2>
                    <a href="../../index.html" class="btn btn-outline-primary"> 
                        <i class="bi bi-arrow-left-circle me-2"></i>Volver al Panel Principal
                    </a>
                </div>

                <!-- Mensaje de Alerta de Estado -->
                <div id="status-alert" class="alert alert-success mb-4" role="alert" style="display: none;"></div>

                <div class="action-buttons mb-4">
                    <a href="crear_categoria.html" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>Agregar Nueva Categoría
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Categorías de Equipo Disponibles</h5>

                        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="categories-grid">
                            <!-- Tarjetas inyectadas dinámicamente -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Script de inicialización -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!window.MockDB) return;

            // 1. Mostrar alertas basadas en Query Params
            showQueryParamsAlerts();

            // 2. Renderizar categorías
            renderCategoriesGrid();
        });

        function renderCategoriesGrid() {
            const grid = document.getElementById("categories-grid");
            grid.innerHTML = "";

            const categories = window.MockDB.getCategories();

            if (categories.length > 0) {
                categories.forEach(cat => {
                    const col = document.createElement("div");
                    col.className = "col";
                    col.innerHTML = `
                        <div class="card card-categoria h-100" onclick="window.location.href='ver_categoria.html?id=${cat.id}'" style="cursor: pointer;">
                            <div class="card-body text-center d-flex flex-column justify-content-between">
                                <div>
                                    <i class="bi bi-person-badge-fill categoria-icon" style="font-size: 2.5rem; color: var(--accent-color);"></i> 
                                    <h5 class="card-title mt-3 mb-2 fw-bold">${escapeHTML(cat.nombre_plantilla)}</h5>
                                    <p class="card-text text-muted small">Haz clic para ver los jugadores y entrenadores de esta categoría.</p>
                                </div>
                            </div>
                            <div class="pb-3 d-flex justify-content-center" onclick="event.stopPropagation();"> 
                                <a href="editar_categoria.html?id=${cat.id}" class="btn btn-sm btn-info me-2 text-white">
                                    <i class="bi bi-pencil-square me-1"></i>Editar
                                </a>
                                <button onclick="eliminarCat(${cat.id}, '${escapeJS(cat.nombre_plantilla)}')" class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash-fill me-1"></i>Eliminar
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(col);
                });
            } else {
                grid.innerHTML = `
                    <div class="col-12">
                        <p class="empty-state text-center py-5">No hay categorías de equipo registradas. ¡Agrega una para empezar!</p>
                    </div>
                `;
            }
        }

        function eliminarCat(id, nombre) {
            if (confirm(`¿Estás seguro de que quieres eliminar la categoría "${nombre}"? Ten en cuenta que los miembros asignados a esta categoría quedarán sin plantilla asociada.`)) {
                const success = window.MockDB.deleteCategory(id);
                if (success) {
                    window.location.href = "index.html?status=success_delete";
                } else {
                    window.location.href = "index.html?status=error&message=" + encodeURIComponent("Error al eliminar la categoría.");
                }
            }
        }

        function showQueryParamsAlerts() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertBox = document.getElementById("status-alert");
            
            if (urlParams.has("status")) {
                const status = urlParams.get("status");
                alertBox.style.display = "block";
                
                alertBox.className = "alert alert-success mb-4";
                
                if (status === "success_add") {
                    alertBox.textContent = "¡Categoría de Plantilla agregada exitosamente!";
                } else if (status === "success_edit") {
                    alertBox.textContent = "¡Categoría de Plantilla actualizada exitosamente!";
                } else if (status === "success_delete") {
                    alertBox.textContent = "¡Categoría de Plantilla eliminada exitosamente! Ten en cuenta que los miembros asignados han quedado sin plantilla asociada.";
                } else if (status === "error") {
                    alertBox.className = "alert alert-danger mb-4";
                    alertBox.textContent = urlParams.get("message") || "Ocurrió un error inesperado al procesar la categoría.";
                }

                const newUrl = window.location.pathname;
                history.replaceState(null, '', newUrl);

                setTimeout(() => {
                    alertBox.style.opacity = '0';
                    alertBox.style.transition = 'opacity 0.5s ease-out';
                    setTimeout(() => { alertBox.style.display = 'none'; alertBox.style.opacity = '1'; }, 500);
                }, 5000);
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        function escapeJS(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'")
                      .replace(/"/g, '\\"');
        }
    </script>
</body>
</html>
