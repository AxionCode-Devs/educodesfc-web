<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Eventos - Club Deportivo</title>

    <!-- Scripts de Mocking y Layout -->
    <script src="../../js/mock-db.js"></script>
    <script src="../../js/layout.js" defer></script>
    <script>
        window.pageTitle = "Gestión de Eventos";
        window.activePage = "eventos";
    </script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar inyectado dinámicamente -->
        <div id="layout-sidebar"></div>

        <main class="main-content">
            <!-- Header inyectado dinámicamente -->
            <div id="layout-top-header"></div>

            <section class="dashboard-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Gestión de Eventos y Torneos</h2>
                    <a href="../../index.html" class="btn btn-outline-primary"> 
                        <i class="bi bi-arrow-left-circle me-2"></i>Volver al Panel Principal
                    </a>
                </div>

                <!-- Mensaje de Alerta de Estado -->
                <div id="status-alert" class="alert alert-success mb-4" role="alert" style="display: none;"></div>

                <div class="action-buttons mb-4">
                    <a href="crear.html" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Evento</a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Lista de Eventos Registrados</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Tipo</th>
                                        <th>Fecha Inicio</th>
                                        <th>Fecha Fin</th>
                                        <th>Hora</th>
                                        <th>Categoría</th>
                                        <th>Lugar</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="eventos-tbody">
                                    <tr>
                                        <td colspan="10" class="text-center py-4">Cargando eventos...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Script de inicialización -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!window.MockDB) return;

            // 1. Mostrar alertas basadas en Query Params
            showQueryParamsAlerts();

            // 2. Renderizar eventos
            renderEventosTable();
        });

        function renderEventosTable() {
            const tbody = document.getElementById("eventos-tbody");
            tbody.innerHTML = "";

            const eventos = window.MockDB.getEvents();

            if (eventos.length > 0) {
                eventos.forEach(evento => {
                    const row = document.createElement("tr");

                    let estadoClass = "bg-secondary text-white";
                    switch (evento.estado) {
                        case 'Programado':
                            estadoClass = 'bg-info text-dark'; 
                            break;
                        case 'En Curso':
                            estadoClass = 'bg-warning text-dark'; 
                            break;
                        case 'Finalizado':
                            estadoClass = 'bg-success text-white'; 
                            break;
                        case 'Cancelado':
                            estadoClass = 'bg-danger text-white'; 
                            break;
                    }

                    // Formatear hora de HH:MM:SS a HH:MM
                    const horaIni = (evento.hora_inicio || "").substring(0, 5);
                    const horaFin = (evento.hora_fin || "").substring(0, 5);
                    const horaStr = horaIni && horaFin ? `${horaIni} - ${horaFin}` : 'N/A';

                    row.innerHTML = `
                        <td>${evento.id}</td>
                        <td class="fw-bold">${escapeHTML(evento.nombre)}</td>
                        <td>${escapeHTML(evento.tipo_evento)}</td>
                        <td>${formatDate(evento.fecha_inicio)}</td>
                        <td>${evento.fecha_fin ? formatDate(evento.fecha_fin) : 'N/A'}</td>
                        <td>${horaStr}</td>
                        <td><span class="badge bg-secondary">${escapeHTML(evento.categoria || 'N/A')}</span></td>
                        <td>${escapeHTML(evento.lugar)}</td>
                        <td><span class="badge ${estadoClass}">${escapeHTML(evento.estado)}</span></td>
                        <td>
                            <a href="editar.html?id=${evento.id}" class="btn btn-sm btn-info text-white me-1">
                                <i class="bi bi-pencil-square me-1"></i>Editar
                            </a>
                            <button onclick="eliminarEvento(${evento.id}, '${escapeJS(evento.nombre)}')" class="btn btn-sm btn-danger">
                                <i class="bi bi-trash me-1"></i>Eliminar
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="text-center py-5 text-muted">No hay eventos registrados.</td>
                    </tr>
                `;
            }
        }

        function eliminarEvento(id, nombre) {
            if (confirm(`¿Estás seguro de que quieres eliminar el evento "${nombre}"? Esta acción no se puede deshacer.`)) {
                const success = window.MockDB.deleteEvent(id);
                if (success) {
                    window.location.href = "index.html?status=success_delete";
                } else {
                    window.location.href = "index.html?status=error&message=" + encodeURIComponent("Error al eliminar el evento.");
                }
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const [year, month, day] = dateStr.split('-');
                return `${day}/${month}/${year}`;
            } catch(e) {
                return dateStr;
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;')
                       .replace(/'/g, '&#039;');
        }

        function escapeJS(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'")
                      .replace(/"/g, '\\"');
        }

        function showQueryParamsAlerts() {
            const urlParams = new URLSearchParams(window.location.search);
            const alertBox = document.getElementById("status-alert");
            
            if (urlParams.has("status")) {
                const status = urlParams.get("status");
                alertBox.style.display = "block";
                alertBox.className = "alert alert-success mb-4";
                
                if (status === "success_add") {
                    alertBox.textContent = "¡Evento creado exitosamente!";
                } else if (status === "success_edit") {
                    alertBox.textContent = "¡Evento actualizado exitosamente!";
                } else if (status === "success_delete") {
                    alertBox.textContent = "¡Evento eliminado exitosamente!";
                } else if (status === "error") {
                    alertBox.className = "alert alert-danger mb-4";
                    alertBox.textContent = urlParams.get("message") || "Ocurrió un error inesperado al procesar el evento.";
                }

                // Limpiar query params de la URL sin recargar
                const cleanUrl = window.location.pathname;
                window.history.replaceState(null, '', cleanUrl);

                setTimeout(() => {
                    alertBox.style.opacity = '0';
                    alertBox.style.transition = 'opacity 0.5s ease-out';
                    setTimeout(() => { alertBox.style.display = 'none'; alertBox.style.opacity = '1'; }, 500);
                }, 5000);
            }
        }
    </script>
</body>
</html>
